<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary Tracker Pro | Dashboard</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --success: #4ade80;
            --danger: #ef4444;
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .main-wrapper {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 2rem;
            max-width: 1100px;
            width: 100%;
            margin-top: 2rem;
        }

        @media (max-width: 900px) {
            .main-wrapper { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }

        h2 { font-weight: 400; color: var(--primary); margin-top: 0; margin-bottom: 1.5rem; }

        .input-group { margin-bottom: 1.5rem; text-align: left; }
        label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        input {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
            color: white; font-size: 1.1rem; box-sizing: border-box; outline: none;
        }
        input:focus { border-color: var(--primary); }

        .display-box {
            background: rgba(0,0,0,0.2);
            padding: 1.5rem;
            border-radius: 15px;
            margin-bottom: 1rem;
            text-align: center;
        }
        .val { font-family: 'JetBrains Mono', monospace; font-size: 2rem; font-weight: 700; display: block; }
        .label-small { font-size: 0.7rem; color: #64748b; text-transform: uppercase; }

        .btn-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 10px; 
            margin-top: 1rem; 
        }
        button {
            padding: 14px; border: none; border-radius: 12px; font-weight: 600;
            cursor: pointer; transition: 0.3s; text-transform: uppercase;
            font-size: 0.75rem;
        }
        .btn-main { background: linear-gradient(to right, var(--primary), var(--secondary)); color: white; grid-column: span 3; font-size: 0.9rem; }
        .btn-receive { background: var(--success); color: #064e3b; grid-column: span 3; font-size: 0.9rem; margin-bottom: 10px; }
        .btn-reset { background: #334155; color: white; }
        .btn-clear { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
        
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-clear:hover { background: var(--danger); color: white; }

        /* ESTILO DO HISTÓRICO E SCROLLBAR */
        .history-container { 
            max-height: 380px; /* Altura ideal para mostrar cerca de 4 itens antes do scroll */
            overflow-y: auto; 
            padding-right: 12px;
            scrollbar-width: thin; /* Firefox */
            scrollbar-color: var(--secondary) transparent; /* Firefox */
        }

        /* Scrollbar Estilizada para Chrome, Safari e Edge */
        .history-container::-webkit-scrollbar {
            width: 6px;
        }

        .history-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
        }

        .history-container::-webkit-scrollbar-thumb {
            background: linear-gradient(var(--primary), var(--secondary));
            border-radius: 10px;
            border: 2px solid transparent;
        }

        .history-container::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        .history-item {
            background: rgba(255,255,255,0.03);
            padding: 1.2rem;
            border-radius: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--success);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .history-info { text-align: left; }
        .history-date { font-size: 0.75rem; color: #64748b; margin-top: 4px; }
        .history-amount { font-weight: 700; color: var(--success); font-size: 1.1rem; }

        .btn-del {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            width: 32px;
            height: 32px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="card">
        <h2>Painel de Controle</h2>
        <div class="input-group">
            <label>Sua Hora (R$)</label>
            <input type="number" id="hourly-rate" placeholder="Digite o valor da hora" onchange="saveConfig()">
        </div>

        <div class="display-box">
            <span class="label-small">Sessão Atual</span>
            <span id="time-display" class="val">00:00:00</span>
        </div>

        <div class="display-box">
            <span class="label-small">Ganhos em Tempo Real</span>
            <span id="money-display" class="val" style="color: var(--success)">R$ 0,00</span>
        </div>

        <button id="btn-toggle" class="btn-main" onclick="toggleTimer()">Iniciar Trabalho</button>
        <button id="btn-receive" class="btn-receive" onclick="receivePayment()" style="display: none;">Receber e Finalizar</button>
        
        <div class="btn-grid">
            <button class="btn-reset" onclick="resetTimer()">Resetar</button>
            <button class="btn-clear" style="grid-column: span 2;" onclick="clearAllData()">Apagar Tudo</button>
        </div>
    </div>

    <div class="card">
        <h2>Histórico de Ganhos</h2>
        <div class="display-box" style="background: rgba(74, 222, 128, 0.05); border: 1px solid rgba(74, 222, 128, 0.1);">
            <span class="label-small" style="color: var(--success)">Total Acumulado Geral</span>
            <span id="total-general" class="val" style="color: var(--success)">R$ 0,00</span>
        </div>
        
        <div class="history-container" id="history-list">
            </div>
    </div>
</div>

<script>
    let seconds = 0;
    let timerInterval = null;
    let history = JSON.parse(localStorage.getItem('salaryHistory')) || [];

    window.onload = () => {
        const savedRate = localStorage.getItem('hourlyRate');
        if(savedRate) document.getElementById('hourly-rate').value = savedRate;
        
        // Recuperar tempo decorrido baseado no timestamp do computador
        const startTime = localStorage.getItem('timerStartTime');
        const timerRunning = localStorage.getItem('timerRunning') === 'true';
        
        if (timerRunning && startTime) {
            const elapsed = Math.floor((Date.now() - parseInt(startTime)) / 1000);
            seconds = parseInt(localStorage.getItem('timerSeconds') || 0) + elapsed;
            localStorage.setItem('timerSeconds', seconds);
            updateDisplay();
            
            // Reiniciar o timer automaticamente
            document.getElementById('btn-toggle').click();
        } else {
            seconds = parseInt(localStorage.getItem('timerSeconds') || 0);
            updateDisplay();
        }
        
        updateHistoryUI();
    };

    function saveConfig() {
        localStorage.setItem('hourlyRate', document.getElementById('hourly-rate').value);
    }

    function updateDisplay() {
        const hrs = Math.floor(seconds / 3600);
        const mins = Math.floor((seconds % 3600) / 60);
        const secs = seconds % 60;
        document.getElementById('time-display').innerText = 
            `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

        const currentRate = parseFloat(document.getElementById('hourly-rate').value) || 0;
        const earned = (currentRate / 3600) * seconds;
        document.getElementById('money-display').innerText = 
            earned.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        
        document.getElementById('btn-receive').style.display = earned > 0 ? 'block' : 'none';
    }

    function toggleTimer() {
        const btn = document.getElementById('btn-toggle');
        const rateInput = document.getElementById('hourly-rate');

        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
            btn.innerText = "Retomar Trabalho";
            rateInput.disabled = false;
            localStorage.setItem('timerRunning', 'false');
            localStorage.setItem('timerSeconds', seconds);
        } else {
            const currentRate = parseFloat(rateInput.value) || 0;
            if (currentRate <= 0) return alert("Por favor, defina o valor da sua hora primeiro!");
            
            rateInput.disabled = true;
            btn.innerText = "Pausar Sessão";
            
            // Salvar o timestamp de início
            localStorage.setItem('timerStartTime', Date.now().toString());
            localStorage.setItem('timerRunning', 'true');
            
            timerInterval = setInterval(() => {
                seconds++;
                localStorage.setItem('timerSeconds', seconds);
                updateDisplay();
            }, 1000);
        }
    }

    function receivePayment() {
        const currentRate = parseFloat(document.getElementById('hourly-rate').value) || 0;
        const earned = (currentRate / 3600) * seconds;
        
        if (earned <= 0) return;

        const entry = {
            id: Date.now(),
            amount: earned,
            duration: document.getElementById('time-display').innerText,
            date: new Date().toLocaleDateString('pt-BR') + ' às ' + new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'})
        };

        history.unshift(entry);
        localStorage.setItem('salaryHistory', JSON.stringify(history));
        
        resetTimer();
        updateHistoryUI();
    }

    function updateHistoryUI() {
        const list = document.getElementById('history-list');
        const totalDisplay = document.getElementById('total-general');
        list.innerHTML = '';
        
        let total = 0;
        history.forEach(item => {
            total += item.amount;
            list.innerHTML += `
                <div class="history-item">
                    <div class="history-info">
                        <div class="history-amount">${item.amount.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</div>
                        <div class="history-date">${item.date} • ${item.duration}</div>
                    </div>
                    <button class="btn-del" onclick="deleteEntry(${item.id})">&times;</button>
                </div>
            `;
        });
        totalDisplay.innerText = total.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function deleteEntry(id) {
        history = history.filter(item => item.id !== id);
        localStorage.setItem('salaryHistory', JSON.stringify(history));
        updateHistoryUI();
    }

    function resetTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
        seconds = 0;
        document.getElementById('btn-toggle').innerText = "Iniciar Trabalho";
        document.getElementById('hourly-rate').disabled = false;
        localStorage.setItem('timerSeconds', '0');
        localStorage.setItem('timerRunning', 'false');
        localStorage.removeItem('timerStartTime');
        updateDisplay();
    }

    function clearAllData() {
        if (confirm("⚠️ Deseja apagar todo o histórico e configurações? Esta ação não pode ser desfeita.")) {
            localStorage.clear();
            history = [];
            seconds = 0;
            document.getElementById('hourly-rate').value = '';
            resetTimer();
            updateHistoryUI();
        }
    }
</script>

</body>
</html>
